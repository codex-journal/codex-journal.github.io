name: Publish Essay

on:
  workflow_dispatch:
    inputs:
      essay_id:
        description: "Essay directory name (e.g. source_engineering_intellectual_production_after_history)"
        required: true
        type: string
      lineage:
        description: "Knots lineage name"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEPLOY_KEY: ${{ secrets.SOURCE_ENGINEERING_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "GIT_SSH_COMMAND=ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" >> "$GITHUB_ENV"

      - name: Install Pandoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pandoc

      - name: Sync lineage
        run: python build/sync_lineage.py "${{ inputs.essay_id }}" git@github.com:codex-journal/source_engineering.git "${{ inputs.lineage }}"

      - name: Rebuild index
        run: python build/build_index.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "essays/${{ inputs.essay_id }}/" "_data/essays.json" index.html essays.html feeds.html
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Sync ${{ inputs.essay_id }} (${{ inputs.lineage }})"
          git push

      - name: Cleanup
        if: always()
        run: rm -rf ~/.ssh/deploy_key
