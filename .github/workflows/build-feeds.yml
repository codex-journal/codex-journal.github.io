name: Build Feeds

on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: [main]
    paths:
      - "_data/feeds.json"
      - "build/build_index.py"
      - "build/index-template.html"
      - "build/feeds-template.html"
      - "build/essays-template.html"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build index and feeds
        run: python3 build/build_index.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html feeds.html essays.html
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Rebuild feeds"
          git push
