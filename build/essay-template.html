<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$title$ | Codex</title>
    <link rel="stylesheet" href="/css/site.css">
    <link rel="stylesheet" href="/css/essay.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#ffffff">
    <style>
        .essay-header {
            position: relative;
            overflow: hidden;
        }
        .essay-header-captcha {
            position: absolute;
            right: 0;
            top: 40%;
            transform: translateY(-50%);
            width: 65%;
            height: auto;
            opacity: 0.18;
            filter: grayscale(100%) brightness(1.2);
            mix-blend-mode: multiply;
            pointer-events: none;
            user-select: none;
        }
        @media (max-width: 600px) {
            .essay-header-captcha { display: none; }
        }
        .bottom-art {
            text-align: center;
            margin-top: 1.5rem;
            overflow: hidden;
        }
        .bottom-art-img {
            max-width: 60%;
            height: auto;
            opacity: 0.25;
            filter: grayscale(100%) brightness(1.2);
            mix-blend-mode: multiply;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="site-container">
        <nav class="site-nav">
            <a href="/" class="nav-home">Codex</a>
            <div class="nav-links">
                <a href="/essays.html">Essays</a>
                <a href="/feeds.html">Feeds</a>
                <a href="/archive.html">Archive</a>
            </div>
        </nav>

        <article class="essay">
            <header class="essay-header">
                <img src="/resources/captcha-codex-journal.jpg" alt="" aria-hidden="true" class="essay-header-captcha">
                <h1 class="essay-title">$title$</h1>
                <div class="essay-meta">
                    <span>$for(author)$$author$$sep$, $endfor$</span>
$if(version)$
                    <span>$version$</span>
$endif$
$if(date)$
                    <span>$date$</span>
$endif$
                </div>
            </header>

            <div class="essay-body">
$body$
            </div>
        </article>

        <footer class="site-footer">
            <p>Codex: Journal of Cyphernetics</p>
        </footer>

        <div class="bottom-art" aria-hidden="true">
            <img src="/resources/figure-dotted.jpg" alt="" class="bottom-art-img">
        </div>
    </div>
<script src="/js/sidebars.js"></script>
</body>
</html>
